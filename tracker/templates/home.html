<!DOCTYPE html>
<html>
<head>
    <title>Add Data</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">➕ Add Fitness Data</h2>

    <form method="POST" class="card p-4 shadow">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Exercise</label>
            <input type="text" name="exercise" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Duration</label>
            <input type="number" name="duration" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Calories</label>
            <input type="number" name="calories" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary w-100">Save Data</button>
    </form>

    <div class="text-center mt-3">
        <a href="/" class="btn btn-secondary">⬅ Back</a>
    </div>

</div>

</body>
</html>
